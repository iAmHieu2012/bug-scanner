# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Bước 1: Cài đặt môi trường Java 17 để chạy Gradle
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Bước 2: Ép Node.js dùng 4GB RAM và thực hiện Build Kotlin/JS
      - name: Build Kotlin JS
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: cd src && ./gradlew composeApp:jsBrowserDistribution

      # Bước 3: Đẩy file Build lên Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUGSCANNER_2026 }}
          channelId: live
          projectId: bugscanner-2026
          entryPoint: "./src"