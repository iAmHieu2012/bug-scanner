name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bước 1: Cài đặt môi trường Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Bước 2: Ép Node.js dùng 4GB RAM và thực hiện Build Kotlin/JS
      - name: Build Kotlin JS
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: cd src && ./gradlew composeApp:jsBrowserDistribution

      # Bước 3: Đẩy file Build lên Firebase (Preview)
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUGSCANNER_2026 }}
          projectId: bugscanner-2026
          entryPoint: "./src"